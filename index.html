<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>学習管理</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:sans-serif;
background:#f4f6fb;
margin:0;
}

.container{
max-width:700px;
margin:auto;
padding:10px;
}

h1{
text-align:center;
}

.card{
background:white;
padding:20px;
margin:12px 0;
border-radius:16px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

button{
border:none;
padding:10px 14px;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

.add{
background:#4CAF50;
color:white;
}

.delete{
background:#e74c3c;
color:white;
}

.plus{
background:#4CAF50;
color:white;
width:40px;
}

.minus{
background:#888;
color:white;
width:40px;
}

input,select{
padding:8px;
margin:4px;
font-size:14px;
}

.taskRow{
display:flex;
justify-content:space-between;
align-items:center;
margin:8px 0;
}

.taskButtons{
display:flex;
align-items:center;
gap:6px;
}

</style>
</head>

<body>

<div class="container">

<h1>学習管理</h1>

<div class="card">
<h3>今日やるタスク</h3>
<div id="todayTasks"></div>
</div>

<div class="card">

<h3>タスク追加</h3>

<select id="category"></select>

<input id="taskName" placeholder="タスク">

<input id="limit" type="number" min="1" placeholder="回数(任意)">

<select id="date">
<option value="today">今日</option>
<option value="tomorrow">明日</option>
</select>

<button class="add" onclick="addTask()">追加</button>

</div>

<div class="card">

<h3>タスク</h3>
<div id="taskList"></div>

</div>

<div class="card">

<h3>カテゴリ達成率</h3>

<canvas id="chart"></canvas>

</div>

<div class="card">

<h3>カテゴリ管理</h3>

<input id="newCategory" placeholder="カテゴリ名">

<button class="add" onclick="addCategory()">追加</button>

<div id="categoryList"></div>

</div>

<div class="card">

<h3>バックアップ</h3>

<button class="add" onclick="backup()">バックアップ</button>

<input type="file" onchange="restore(event)">

<br><br>

<label>
自動バックアップ
<input type="checkbox" id="autoBackup">
</label>

<select id="backupInterval">

<option value="1">1日</option>
<option value="7">7日</option>
<option value="30">30日</option>

</select>

</div>

</div>

<script>

let tasks = JSON.parse(localStorage.getItem("tasks")||"[]")
let categories = JSON.parse(localStorage.getItem("categories")||"[]")

function save(){

localStorage.setItem("tasks",JSON.stringify(tasks))
localStorage.setItem("categories",JSON.stringify(categories))

}

function addCategory(){

let name = document.getElementById("newCategory").value

if(!name)return

categories.push(name)

save()

render()

}

function addTask(){

let name = document.getElementById("taskName").value
let category = document.getElementById("category").value
let limit = Number(document.getElementById("limit").value)

let dateSel = document.getElementById("date").value

let date = new Date()

if(dateSel==="tomorrow"){
date.setDate(date.getDate()+1)
}

tasks.push({
name,
category,
limit:limit||null,
done:0,
date:date.toDateString()
})

save()

render()

}

function plusTask(i){

let t=tasks[i]

if(t.limit && t.done>=t.limit)return

t.done++

save()

render()

}

function minusTask(i){

let t=tasks[i]

if(t.done>0){

t.done--

save()

render()

}

}

function deleteTask(i){

tasks.splice(i,1)

save()

render()

}

function render(){

renderCategories()

renderTasks()

renderChart()

renderToday()

}

function renderCategories(){

let select=document.getElementById("category")
select.innerHTML=""

categories.forEach(c=>{

let op=document.createElement("option")
op.textContent=c
select.appendChild(op)

})

}

function renderTasks(){

let box=document.getElementById("taskList")

box.innerHTML=""

tasks.forEach((t,i)=>{

box.innerHTML+=`

<div class="taskRow">

<div>[${t.category}] ${t.name}</div>

<div class="taskButtons">

<button class="minus" onclick="minusTask(${i})">−</button>

<span>${t.done}/${t.limit||"-"}</span>

<button class="plus" onclick="plusTask(${i})">＋</button>

<button class="delete" onclick="deleteTask(${i})">削除</button>

</div>

</div>

`

})

}

function renderToday(){

let box=document.getElementById("todayTasks")

box.innerHTML=""

let today=new Date().toDateString()

tasks
.filter(t=>t.date===today && (!t.limit || t.done<t.limit))
.forEach(t=>{

box.innerHTML+=`<div>・${t.name}</div>`

})

}

let chart

function renderChart(){

let map={}

tasks.forEach(t=>{

if(!map[t.category]){

map[t.category]={done:0,total:0}

}

map[t.category].done+=t.done

if(t.limit)map[t.category].total+=t.limit

})

let labels=[]
let data=[]

Object.keys(map).forEach(c=>{

labels.push(c)

let r=map[c]

let v=r.total?Math.round(r.done/r.total*100):0

data.push(v)

})

if(chart)chart.destroy()

chart=new Chart(

document.getElementById("chart"),

{
type:"bar",
data:{
labels,
datasets:[{
label:"達成率%",
data
}]
},
options:{
scales:{
y:{
min:0,
max:100,
ticks:{
callback:v=>v+"%"
}
}
}
}

}

)

}

function backup(){

let data=JSON.stringify({tasks,categories})

let blob=new Blob([data])

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="studyBackup.json"

a.click()

}

function restore(e){

let file=e.target.files[0]

let reader=new FileReader()

reader.onload=function(){

let data=JSON.parse(reader.result)

tasks=data.tasks
categories=data.categories

save()

render()

}

reader.readAsText(file)

}

function autoBackup(){

let on=document.getElementById("autoBackup").checked

if(!on)return

let days=document.getElementById("backupInterval").value

setInterval(backup,days*86400000)

}

setInterval(autoBackup,60000)

render()

</script>

</body>
</html>
