<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>学習管理</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:sans-serif;
background:#f5f5f5;
margin:0;
padding:10px;
}

h1{
text-align:center;
}

.card{
background:white;
border-radius:10px;
padding:15px;
margin-bottom:15px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

button{
padding:8px 12px;
border:none;
border-radius:6px;
margin:2px;
}

.add{background:#4CAF50;color:white}
.del{background:#e74c3c;color:white}
.ctrl{background:#3498db;color:white}

.task{
border:1px solid #ddd;
border-radius:8px;
padding:10px;
margin:8px 0;
}

.row{
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
}

input,select{
padding:6px;
margin:3px;
}

.toggle{
cursor:pointer;
font-weight:bold;
}

.hidden{
display:none;
}

</style>
</head>

<body>

<h1>学習管理</h1>

<div class="card">
<h3>今日やるタスク</h3>
<div id="todayTasks"></div>
</div>

<div class="card">

<div class="toggle" onclick="toggle('catBox')">＋カテゴリ管理</div>

<div id="catBox" class="hidden">

<input id="newCat" placeholder="カテゴリ名">
<button class="add" onclick="addCategory()">追加</button>

<div id="catList"></div>

</div>

</div>

<div class="card">

<h3>タスク追加</h3>

<select id="taskCat"></select>

<input id="taskName" placeholder="タスク">

<input id="taskCount" type="number" min="1" placeholder="回数(任意)">

<select id="deadlineType" onchange="deadlineChange()">

<option>今日</option>
<option>今週</option>
<option>今月</option>
<option>3ヶ月</option>
<option>半年</option>
<option>今年</option>
<option>日付指定</option>

</select>

<input type="date" id="deadlineDate" class="hidden">

<button class="add" onclick="addTask()">追加</button>

</div>

<div class="card">

<h3>タスク</h3>

<div id="taskList"></div>

</div>

<div class="card">

<h3>カテゴリ達成率</h3>

<canvas id="chart"></canvas>

</div>

<div class="card">

<h3>履歴</h3>

<div id="history5"></div>

<div class="toggle" onclick="toggle('historyAll')">＋履歴（全表示）</div>

<div id="historyAll" class="hidden"></div>

<button class="del" onclick="clearHistory()">履歴削除</button>

</div>

<div class="card">

<h3>データ</h3>

<button class="add" onclick="backup()">バックアップ</button>

<input type="file" onchange="restore(event)">

</div>

<script>

let data=JSON.parse(localStorage.getItem("study_v7"))||{
categories:[],
tasks:[],
history:[]
}

function save(){
localStorage.setItem("study_v7",JSON.stringify(data))
render()
}

function toggle(id){
let e=document.getElementById(id)
e.classList.toggle("hidden")
}

function deadlineChange(){
let type=document.getElementById("deadlineType").value
let date=document.getElementById("deadlineDate")
date.classList.toggle("hidden",type!="日付指定")
}

function addCategory(){
let name=document.getElementById("newCat").value
if(!name)return
data.categories.push(name)
document.getElementById("newCat").value=""
save()
}

function deleteCategory(i){
data.categories.splice(i,1)
data.tasks=data.tasks.filter(t=>t.cat!=i)
save()
}

function addTask(){

let cat=document.getElementById("taskCat").value
let name=document.getElementById("taskName").value
let count=parseInt(document.getElementById("taskCount").value)||null
let type=document.getElementById("deadlineType").value
let date=document.getElementById("deadlineDate").value

data.tasks.push({
cat,
name,
count,
progress:0,
deadline:type=="日付指定"?date:type
})

save()

}

function addProgress(i){
let t=data.tasks[i]

if(t.count && t.progress>=t.count)return

t.progress++

data.history.unshift({
date:new Date().toLocaleDateString(),
task:t.name
})

save()

}

function minusProgress(i){

let t=data.tasks[i]

if(t.progress<=0)return

t.progress--

save()

}

function deleteTask(i){

data.tasks.splice(i,1)

save()

}

function moveTask(i,d){

let j=i+d

if(j<0||j>=data.tasks.length)return

let tmp=data.tasks[i]

data.tasks[i]=data.tasks[j]

data.tasks[j]=tmp

save()

}

function backup(){

let blob=new Blob([JSON.stringify(data)],{type:"application/json"})

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="study_backup.json"

a.click()

}

function restore(e){

let file=e.target.files[0]

let reader=new FileReader()

reader.onload=()=>{

data=JSON.parse(reader.result)

save()

}

reader.readAsText(file)

}

function clearHistory(){

data.history=[]

save()

}

function render(){

let catSel=document.getElementById("taskCat")

catSel.innerHTML=""

data.categories.forEach((c,i)=>{
catSel.innerHTML+=`<option value="${i}">${c}</option>`
})

let catList=document.getElementById("catList")

catList.innerHTML=""

data.categories.forEach((c,i)=>{
catList.innerHTML+=`${c} <button class="del" onclick="deleteCategory(${i})">削除</button><br>`
})

let taskList=document.getElementById("taskList")

taskList.innerHTML=""

data.tasks.forEach((t,i)=>{

let cat=data.categories[t.cat]

taskList.innerHTML+=`

<div class="task">

<b>${cat}</b><br>

${t.name}

<br>

${t.progress}${t.count?"/"+t.count:""}

<br>

<button class="ctrl" onclick="minusProgress(${i})">-</button>

<button class="add" onclick="addProgress(${i})">+</button>

<button onclick="moveTask(${i},-1)">↑</button>
<button onclick="moveTask(${i},1)">↓</button>

<button class="del" onclick="deleteTask(${i})">削除</button>

</div>

`

})

renderChart()

renderHistory()

renderToday()

}

function renderToday(){

let box=document.getElementById("todayTasks")

box.innerHTML=""

data.tasks.forEach(t=>{

if(t.deadline=="今日"){
box.innerHTML+=`${t.name}<br>`
}

})

}

function renderHistory(){

let h5=document.getElementById("history5")

let hall=document.getElementById("historyAll")

h5.innerHTML=""
hall.innerHTML=""

data.history.slice(0,5).forEach(h=>{
h5.innerHTML+=`${h.date} ${h.task}<br>`
})

data.history.forEach(h=>{
hall.innerHTML+=`${h.date} ${h.task}<br>`
})

}

function renderChart(){

let catData={}

data.tasks.forEach(t=>{

let cat=data.categories[t.cat]

if(!catData[cat])catData[cat]={done:0,total:0}

catData[cat].done+=t.progress
catData[cat].total+=t.count||1

})

let labels=[]
let values=[]

for(let c in catData){

labels.push(c)

values.push(Math.round(catData[c].done/catData[c].total*100))

}

new Chart(document.getElementById("chart"),{

type:"bar",

data:{
labels:labels,
datasets:[{
label:"達成率%",
data:values
}]
},

options:{
indexAxis:'y',
scales:{
x:{
min:0,
max:100
}
}
}

})

}

render()

</script>

</body>
</html>
