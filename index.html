<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>学習管理</title>

<style>

body{
font-family:sans-serif;
max-width:700px;
margin:auto;
padding:20px;
background:#f4f4f4;
}

h1{
text-align:center;
}

input,select{
padding:8px;
margin:4px;
}

button{
padding:6px 10px;
margin:4px;
}

li{
background:white;
margin:6px 0;
padding:10px;
border-radius:6px;
display:flex;
justify-content:space-between;
align-items:center;
}

.completed span{
text-decoration:line-through;
color:gray;
}

.section{
background:white;
padding:10px;
border-radius:6px;
margin-top:20px;
}

</style>
</head>

<body>

<h1>学習管理</h1>

<div class="section">

<h3>カテゴリ追加</h3>

<input id="categoryInput" placeholder="例: Excel">
<button onclick="addCategory()">追加</button>

<select id="categorySelect"></select>

</div>

<div class="section">

<h3>学習タスク</h3>

<input id="taskInput" placeholder="例: ピボット復習">
<button onclick="addTask()">追加</button>

<ul id="taskList"></ul>

<div id="progress">達成率: 0%</div>

</div>

<div class="section">

<h3>学習タイマー</h3>

<div id="timerDisplay">0:00</div>

<button onclick="startTimer()">開始</button>
<button onclick="stopTimer()">停止</button>
<button onclick="resetTimer()">リセット</button>

</div>

<div class="section">

<h3>学習時間</h3>

<div id="studyStats"></div>

<div class="card">

<p>データのバックアップ</p>

<button onclick="backupData()">バックアップ</button>

<input type="file" id="restoreFile">

<button onclick="restoreData()">復元</button>

</div>

</div>

<script>

let learning_categories=JSON.parse(localStorage.getItem("learning_categories"))||[];
let learning_tasks=JSON.parse(localStorage.getItem("learning_tasks"))||[];
let learning_studyTime=JSON.parse(localStorage.getItem("learning_studyTime"))||{};

function save(){

localStorage.setItem("learning_categories",JSON.stringify(categories));
localStorage.setItem("learning_tasks",JSON.stringify(tasks));
localStorage.setItem("learning_studyTime",JSON.stringify(studyTime));

}

function updateCategorySelect(){

let select=document.getElementById("categorySelect");
select.innerHTML="";

categories.forEach(cat=>{
let option=document.createElement("option");
option.value=cat;
option.textContent=cat;
select.appendChild(option);
});

}

function addCategory(){

let input=document.getElementById("categoryInput");
let name=input.value.trim();

if(name==="")return;

categories.push(name);

if(!studyTime[name]){
studyTime[name]=0;
}

input.value="";

save();
updateCategorySelect();
renderStats();

}

function addTask(){

let text=document.getElementById("learning_taskInput").value.trim();
let cat=document.getElementById("learning_categorySelect").value;

if(text==="")return;

tasks.push({
text:text,
category:cat,
done:false
});

document.getElementById("taskInput").value="";

save();
renderTasks();

}

function renderTasks(){

let list=document.getElementById("taskList");
list.innerHTML="";

let completed=0;

tasks.forEach((task,index)=>{

let li=document.createElement("li");

if(task.done){
li.classList.add("completed");
completed++;
}

let left=document.createElement("div");

let checkbox=document.createElement("input");
checkbox.type="checkbox";
checkbox.checked=task.done;

checkbox.onchange=function(){

tasks[index].done=this.checked;

if(this.checked){

let cat=learning_task.learning_category;

studyTime[cat]+=seconds;

resetTimer();

}

save();
renderTasks();
renderStats();

};

let text=document.createElement("span");
text.textContent=" ["+task.category+"] "+task.text;

left.appendChild(checkbox);
left.appendChild(text);

let del=document.createElement("button");
del.textContent="削除";

del.onclick=function(){

learning_tasks.splice(index,1);

save();
renderTasks();

};

li.appendChild(left);
li.appendChild(del);

list.appendChild(li);

});

let percent=0;

if(tasks.length>0){
percent=Math.round(completed/tasks.length*100);
}

document.getElementById("progress").textContent="達成率: "+percent+"%";

}

function renderStats(){

let div=document.getElementById("studyStats");

div.innerHTML="";

for(let cat in studyTime){

let min=Math.floor(studyTime[cat]/60);

let p=document.createElement("p");

p.textContent=cat+" : "+min+"分";

div.appendChild(p);

}

}

let seconds=0;
let timer=null;

function updateTimer(){

let min=Math.floor(seconds/60);
let sec=seconds%60;

document.getElementById("timerDisplay").textContent=min+":"+sec.toString().padStart(2,"0");

}

function startTimer(){

if(timer)return;

timer=setInterval(function(){

seconds++;
updateTimer();

},1000);

}

function stopTimer(){

clearInterval(timer);
timer=null;

}

function resetTimer(){

stopTimer();
seconds=0;
updateTimer();

}


function backupData(){

let data={
learning_categories:learning_categories,
learning_tasks:learning_tasks,
learning_studyTime:learning_studyTime
};

let blob=new Blob(
[JSON.stringify(data,null,2)],
{type:"application/json"}
);

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);
a.download="learning_backup.json";

a.click();

}

function restoreData(){

let file=document.getElementById("restoreFile").files[0];

if(!file)return;

let reader=new FileReader();

reader.onload=function(e){

let data=JSON.parse(e.target.result);

learning_categories=data.learning_categories||[];
learning_tasks=data.learning_tasks||[];
learning_studyTime=data.learning_studyTime||{};

save();
updateCategorySelect();
renderTasks();
renderStats();

};

reader.readAsText(file);

}
  
updateCategorySelect();
renderTasks();
renderStats();

</script>

</body>
</html>
