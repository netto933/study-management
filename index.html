<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>学習管理</title>

<link rel="manifest" href="manifest.json">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:sans-serif;
max-width:720px;
margin:auto;
padding:15px;
background:#f0f2f5;
}

h1{
text-align:center;
}

.card{
background:white;
padding:15px;
border-radius:10px;
margin-top:15px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

button{
padding:6px 10px;
margin:3px;
border-radius:6px;
border:none;
background:#4CAF50;
color:white;
}

button.delete{
background:#e74c3c;
}

input,select{
padding:6px;
margin:3px;
}

.task{
display:flex;
align-items:center;
justify-content:space-between;
padding:5px 0;
}

.done{
text-decoration:line-through;
color:gray;
}

.historyItem{
border-bottom:1px solid #ddd;
padding:4px;
}

</style>

</head>

<body>

<h1>学習管理</h1>

<div class="card">

<h3>カテゴリ管理</h3>

<input id="catInput" placeholder="カテゴリ">

<button onclick="addCategory()">追加</button>

<div id="catList"></div>

</div>

<div class="card">

<h3>タスク追加</h3>

<select id="catSelect"></select>

<input id="taskInput" placeholder="タスク">

<button onclick="addTask()">追加</button>

</div>

<div class="card">

<h3>今日のタスク</h3>

<div id="taskList"></div>

<p id="progress"></p>

</div>

<div class="card">

<h3>カテゴリ達成率</h3>

<canvas id="chart"></canvas>

</div>

<div class="card">

<h3>履歴</h3>

<div id="history"></div>

<button class="delete" onclick="clearHistory()">履歴削除</button>

</div>

<div class="card">

<h3>データ管理</h3>

<button onclick="backup()">バックアップ</button>

<input type="file" id="restoreFile">

<button onclick="restore()">復元</button>

</div>

<script>

const CAT_KEY="learning_categories_v5";
const TASK_KEY="learning_tasks_v5";

let categories=JSON.parse(localStorage.getItem(CAT_KEY))||[];

let tasks=JSON.parse(localStorage.getItem(TASK_KEY))||[];

function save(){

localStorage.setItem(CAT_KEY,JSON.stringify(categories));

localStorage.setItem(TASK_KEY,JSON.stringify(tasks));

}

function addCategory(){

let name=document.getElementById("catInput").value.trim();

if(!name)return;

categories.push(name);

document.getElementById("catInput").value="";

save();

render();

}

function deleteCategory(i){

let name=categories[i];

categories.splice(i,1);

tasks=tasks.filter(t=>t.category!==name);

save();

render();

}

function addTask(){

let text=document.getElementById("taskInput").value.trim();

let cat=document.getElementById("catSelect").value;

if(!text)return;

tasks.push({

text:text,

category:cat,

done:false,

date:new Date().toDateString()

});

document.getElementById("taskInput").value="";

save();

render();

}

function toggleTask(i){

tasks[i].done=!tasks[i].done;

save();

render();

}

function deleteTask(i){

tasks.splice(i,1);

save();

render();

}

function renderCategories(){

let div=document.getElementById("catList");

div.innerHTML="";

categories.forEach((c,i)=>{

let d=document.createElement("div");

d.innerHTML=c+" <button class='delete' onclick='deleteCategory("+i+")'>削除</button>";

div.appendChild(d);

});

let sel=document.getElementById("catSelect");

sel.innerHTML="";

categories.forEach(c=>{

let o=document.createElement("option");

o.value=c;

o.textContent=c;

sel.appendChild(o);

});

}

function renderTasks(){

let div=document.getElementById("taskList");

div.innerHTML="";

let today=new Date().toDateString();

let todayTasks=tasks.filter(t=>t.date===today);

todayTasks.forEach((t,i)=>{

let index=tasks.indexOf(t);

let row=document.createElement("div");

row.className="task";

let left=document.createElement("div");

let check=document.createElement("input");

check.type="checkbox";

check.checked=t.done;

check.onclick=()=>toggleTask(index);

let span=document.createElement("span");

span.textContent=" ["+t.category+"] "+t.text;

if(t.done)span.className="done";

left.appendChild(check);

left.appendChild(span);

let del=document.createElement("button");

del.textContent="削除";

del.className="delete";

del.onclick=()=>deleteTask(index);

row.appendChild(left);

row.appendChild(del);

div.appendChild(row);

});

let done=todayTasks.filter(t=>t.done).length;

let percent=0;

if(todayTasks.length>0){

percent=Math.round(done/todayTasks.length*100);

}

document.getElementById("progress").textContent="今日の達成率 "+percent+"%";

}

function renderChart(){

let data={};

categories.forEach(c=>data[c]={done:0,total:0});

let today=new Date().toDateString();

tasks.forEach(t=>{

if(t.date===today){

if(!data[t.category])return;

data[t.category].total++;

if(t.done)data[t.category].done++;

}

});

let labels=[];

let values=[];

for(let c in data){

labels.push(c);

let v=0;

if(data[c].total>0){

v=Math.round(data[c].done/data[c].total*100);

}

values.push(v);

}

let ctx=document.getElementById("chart");

new Chart(ctx,{

type:"bar",

data:{

labels:labels,

datasets:[{

label:"達成率%",

data:values

}]

}

});

}

function renderHistory(){

let div=document.getElementById("history");

div.innerHTML="";

let days={};

tasks.forEach(t=>{

if(!days[t.date])days[t.date]=[];

days[t.date].push(t);

});

for(let d in days){

let arr=days[d];

let done=arr.filter(t=>t.done).length;

let p=Math.round(done/arr.length*100);

let item=document.createElement("div");

item.className="historyItem";

item.textContent=d+"　達成率 "+p+"%";

div.appendChild(item);

}

}

function clearHistory(){

if(!confirm("履歴削除しますか？"))return;

tasks=[];

save();

render();

}

function backup(){

let blob=new Blob([JSON.stringify({categories,tasks},null,2)],{type:"application/json"});

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="learning_backup.json";

a.click();

}

function restore(){

let file=document.getElementById("restoreFile").files[0];

if(!file)return;

let reader=new FileReader();

reader.onload=function(e){

let d=JSON.parse(e.target.result);

categories=d.categories||[];

tasks=d.tasks||[];

save();

render();

};

reader.readAsText(file);

}

function render(){

renderCategories();

renderTasks();

renderChart();

renderHistory();

}

render();

if ("serviceWorker" in navigator) {

navigator.serviceWorker.register("service-worker.js");

}

</script>

</body>

</html>
