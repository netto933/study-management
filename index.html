<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>勉強ToDo</title>

<style>
body{
font-family:sans-serif;
max-width:600px;
margin:auto;
padding:20px;
background:#f5f5f5;
}

h1{
text-align:center;
}

input{
padding:8px;
}

button{
padding:6px 10px;
margin-left:5px;
}

li{
background:white;
margin:6px 0;
padding:10px;
border-radius:6px;
display:flex;
align-items:center;
justify-content:space-between;
}

.completed span{
text-decoration:line-through;
color:gray;
}

#progress{
margin-top:20px;
font-weight:bold;
}

.timer{
margin-top:20px;
background:white;
padding:10px;
border-radius:6px;
}

</style>
</head>

<body>

<h1>今日の勉強ToDo</h1>

<input id="todoInput" placeholder="勉強タスクを書く">
<button onclick="addTodo()">追加</button>

<ul id="todoList"></ul>

<div id="progress">達成率: 0%</div>

<div class="timer">

<h3>勉強タイマー</h3>

<div id="time">0:00</div>

<button onclick="startTimer()">開始</button>
<button onclick="stopTimer()">停止</button>
<button onclick="resetTimer()">リセット</button>

</div>

<script>

let todos = JSON.parse(localStorage.getItem("todos")) || [];

function save(){
localStorage.setItem("todos",JSON.stringify(todos));
}

function render(){

let list=document.getElementById("todoList");
list.innerHTML="";

let completed=0;

todos.forEach((todo,index)=>{

let li=document.createElement("li");

if(todo.done){
li.classList.add("completed");
completed++;
}

let left=document.createElement("div");

let checkbox=document.createElement("input");
checkbox.type="checkbox";
checkbox.checked=todo.done;

checkbox.onchange=function(){
todos[index].done=this.checked;
save();
render();
};

let text=document.createElement("span");
text.textContent=" "+todo.text;

left.appendChild(checkbox);
left.appendChild(text);

let del=document.createElement("button");
del.textContent="削除";

del.onclick=function(){
todos.splice(index,1);
save();
render();
};

li.appendChild(left);
li.appendChild(del);

list.appendChild(li);

});

let percent=0;
if(todos.length>0){
percent=Math.round(completed/todos.length*100);
}

document.getElementById("progress").textContent="達成率: "+percent+"%";

}

function addTodo(){

let input=document.getElementById("todoInput");
let text=input.value.trim();

if(text==="") return;

todos.push({text:text,done:false});

input.value="";

save();
render();

}

render();

let seconds=0;
let timer=null;

function updateTimer(){

let min=Math.floor(seconds/60);
let sec=seconds%60;

document.getElementById("time").textContent=min+":"+sec.toString().padStart(2,"0");

}

function startTimer(){

if(timer!==null) return;

timer=setInterval(function(){
seconds++;
updateTimer();
},1000);

}

function stopTimer(){

clearInterval(timer);
timer=null;

}

function resetTimer(){

stopTimer();
seconds=0;
updateTimer();

}

updateTimer();

</script>

</body>
</html>
