<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>学習管理</title>

<link rel="manifest" href="manifest.json">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:sans-serif;
max-width:700px;
margin:auto;
padding:20px;
background:#f4f4f4;
}

h1{
text-align:center;
}

.section{
background:white;
padding:15px;
border-radius:8px;
margin-top:20px;
}

button{
padding:6px 10px;
margin:4px;
}

input{
padding:6px;
}

.category{
display:flex;
justify-content:space-between;
margin:5px 0;
}

.timer{
font-size:24px;
margin:10px 0;
}

</style>
</head>

<body>

<h1>学習管理</h1>

<div class="section">

<h3>カテゴリ</h3>

<input id="catInput" placeholder="カテゴリ名">
<button onclick="addCategory()">追加</button>

<div id="catList"></div>

</div>

<div class="section">

<h3>学習開始</h3>

<div id="startButtons"></div>

<div class="timer" id="timer">0:00</div>

<button onclick="stopStudy()">学習終了</button>

</div>

<div class="section">

<h3>今日の履歴</h3>

<div id="todayLog"></div>

</div>

<div class="section">

<h3>今週の学習時間</h3>

<canvas id="chart"></canvas>

</div>

<div class="section">

<h3>データ</h3>

<button onclick="backup()">バックアップ</button>

<input type="file" id="restoreFile">
<button onclick="restore()">復元</button>

</div>

<script>

const CAT_KEY="learning_categories";
const SESS_KEY="learning_sessions";

let categories=JSON.parse(localStorage.getItem(CAT_KEY))||[];
let sessions=JSON.parse(localStorage.getItem(SESS_KEY))||[];

let currentCategory=null;
let startTime=null;
let timer=null;

function save(){

localStorage.setItem(CAT_KEY,JSON.stringify(categories));
localStorage.setItem(SESS_KEY,JSON.stringify(sessions));

}

function addCategory(){

let input=document.getElementById("catInput");

let name=input.value.trim();

if(!name)return;

categories.push(name);

input.value="";

save();

render();

}

function deleteCategory(i){

categories.splice(i,1);

save();

render();

}

function renderCategories(){

let div=document.getElementById("catList");

div.innerHTML="";

categories.forEach((cat,i)=>{

let d=document.createElement("div");

d.className="category";

d.innerHTML=cat+" <button onclick='deleteCategory("+i+")'>削除</button>";

div.appendChild(d);

});

}

function renderStartButtons(){

let div=document.getElementById("startButtons");

div.innerHTML="";

categories.forEach(cat=>{

let b=document.createElement("button");

b.textContent="▶ "+cat;

b.onclick=function(){startStudy(cat)};

div.appendChild(b);

});

}

function startStudy(cat){

currentCategory=cat;

startTime=Date.now();

if(timer)clearInterval(timer);

timer=setInterval(updateTimer,1000);

}

function updateTimer(){

let sec=Math.floor((Date.now()-startTime)/1000);

let m=Math.floor(sec/60);

let s=sec%60;

document.getElementById("timer").textContent=m+":"+s.toString().padStart(2,"0");

}

function stopStudy(){

if(!startTime)return;

let duration=Math.floor((Date.now()-startTime)/1000);

sessions.push({

category:currentCategory,

duration:duration,

date:new Date().toISOString()

});

startTime=null;

clearInterval(timer);

timer=null;

document.getElementById("timer").textContent="0:00";

save();

render();

}

function renderToday(){

let div=document.getElementById("todayLog");

div.innerHTML="";

let today=new Date().toDateString();

sessions.forEach(s=>{

if(new Date(s.date).toDateString()==today){

let m=Math.floor(s.duration/60);

let p=document.createElement("p");

p.textContent=s.category+" "+m+"分";

div.appendChild(p);

}

});

}

function weekData(){

let data={};

categories.forEach(c=>data[c]=0);

let weekAgo=Date.now()-7*24*3600*1000;

sessions.forEach(s=>{

let t=new Date(s.date).getTime();

if(t>weekAgo){

data[s.category]+=s.duration;

}

});

return data;

}

let chart;

function renderChart(){

let d=weekData();

let labels=Object.keys(d);

let vals=labels.map(k=>Math.floor(d[k]/60));

let ctx=document.getElementById("chart");

if(chart)chart.destroy();

chart=new Chart(ctx,{

type:"bar",

data:{

labels:labels,

datasets:[{

label:"分",

data:vals

}]

}

});

}

function backup(){

let data={categories,sessions};

let blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="learning_backup.json";

a.click();

}

function restore(){

let file=document.getElementById("restoreFile").files[0];

if(!file)return;

let reader=new FileReader();

reader.onload=function(e){

let d=JSON.parse(e.target.result);

categories=d.categories||[];

sessions=d.sessions||[];

save();

render();

};

reader.readAsText(file);

}

function render(){

renderCategories();

renderStartButtons();

renderToday();

renderChart();

}

render();

if ("serviceWorker" in navigator) {
navigator.serviceWorker.register("service-worker.js");
}

</script>

</body>
</html>
