<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>学習管理</title>

<link rel="manifest" href="manifest.json">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:sans-serif;
max-width:720px;
margin:auto;
padding:15px;
background:#f0f2f5;
}

h1{
text-align:center;
}

.card{
background:white;
padding:15px;
border-radius:10px;
margin-top:15px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

button{
padding:6px 10px;
margin:3px;
border:none;
border-radius:6px;
background:#4CAF50;
color:white;
}

button.delete{
background:#e74c3c;
}

button.edit{
background:#3498db;
}

.toggle{
cursor:pointer;
font-weight:bold;
}

.task{
display:flex;
align-items:center;
justify-content:space-between;
margin:5px 0;
}

.done{
text-decoration:line-through;
color:gray;
}

</style>

</head>

<body>

<h1>学習管理</h1>

<div class="card">

<div class="toggle" onclick="toggleCat()">▶ カテゴリ管理</div>

<div id="catSection" style="display:none">

<input id="catInput" placeholder="カテゴリ">

<button onclick="addCategory()">追加</button>

<div id="catList"></div>

</div>

</div>

<div class="card">

<h3>タスク追加</h3>

<select id="catSelect"></select>

<input id="taskInput" placeholder="タスク">

<input id="progressTotal" type="number" min="1" placeholder="回数(任意)">

<select id="deadlineType">

<option value="today">今日</option>
<option value="week">今週</option>
<option value="month">今月</option>
<option value="3month">3ヶ月</option>
<option value="6month">半年</option>
<option value="year">今年</option>
<option value="date">日付指定</option>

</select>

<input type="date" id="datePicker" style="display:none">

<button onclick="addTask()">追加</button>

</div>

<div class="card">

<h3>タスク</h3>

<div id="taskList"></div>

</div>

<div class="card">

<h3>カテゴリ達成率</h3>

<canvas id="chart"></canvas>

</div>

<div class="card">

<h3>履歴</h3>

<div id="history"></div>

<div class="toggle" onclick="toggleHistory()">▶ 履歴（全表示）</div>

<div id="allHistory" style="display:none"></div>

<button class="delete" onclick="clearHistory()">履歴削除</button>

</div>

<div class="card">

<h3>データ</h3>

<button onclick="backup()">バックアップ</button>

<input type="file" id="restoreFile">

<button onclick="restore()">復元</button>

</div>

<script>

const CAT_KEY="learning_cat_v7";
const TASK_KEY="learning_task_v7";

let categories=JSON.parse(localStorage.getItem(CAT_KEY))||[];
let tasks=JSON.parse(localStorage.getItem(TASK_KEY))||[];

function save(){

localStorage.setItem(CAT_KEY,JSON.stringify(categories));
localStorage.setItem(TASK_KEY,JSON.stringify(tasks));

}

function toggleCat(){

let sec=document.getElementById("catSection");

sec.style.display=sec.style.display==="none"?"block":"none";

}

function toggleHistory(){

let sec=document.getElementById("allHistory");

sec.style.display=sec.style.display==="none"?"block":"none";

}

function addCategory(){

let name=document.getElementById("catInput").value.trim();

if(!name)return;

categories.push(name);

document.getElementById("catInput").value="";

save();
render();

}

function deleteCategory(i){

if(!confirm("削除してよろしいですか？"))return;

let name=categories[i];

categories.splice(i,1);

tasks=tasks.filter(t=>t.category!==name);

save();
render();

}

function addTask(){

let text=document.getElementById("taskInput").value.trim();
let cat=document.getElementById("catSelect").value;
let total=parseInt(document.getElementById("progressTotal").value);

if(total<0) total=0;

let deadlineType=document.getElementById("deadlineType").value;

let date=null;

if(deadlineType==="date"){

date=document.getElementById("datePicker").value;

}

tasks.push({

text,
category:cat,
progress:0,
total:isNaN(total)?null:total,
done:false,
deadlineType,
date,
created:new Date().toDateString()

});

document.getElementById("taskInput").value="";
document.getElementById("progressTotal").value="";

save();
render();

}

document.getElementById("deadlineType").onchange=function(){

document.getElementById("datePicker").style.display=
this.value==="date"?"inline":"none";

};

function progressTask(i){

let t=tasks[i];

if(t.total!==null && t.progress>=t.total)return;

t.progress++;

if(t.total!==null && t.progress>=t.total){

t.done=true;

}

save();
render();

}

function deleteTask(i){

if(!confirm("削除してよろしいですか？"))return;

tasks.splice(i,1);

save();
render();

}

function renderCategories(){

let div=document.getElementById("catList");

div.innerHTML="";

categories.forEach((c,i)=>{

let d=document.createElement("div");

d.innerHTML=c+" <button class='delete' onclick='deleteCategory("+i+")'>削除</button>";

div.appendChild(d);

});

let sel=document.getElementById("catSelect");

sel.innerHTML="";

categories.forEach(c=>{

let o=document.createElement("option");

o.value=c;
o.textContent=c;

sel.appendChild(o);

});

}

function renderTasks(){

let div=document.getElementById("taskList");

div.innerHTML="";

tasks.forEach((t,i)=>{

let row=document.createElement("div");

row.className="task";

let label=t.text;

if(t.total!==null){

label+=" ("+t.progress+"/"+t.total+")";

}

let span=document.createElement("span");

span.textContent="["+t.category+"] "+label;

if(t.done)span.className="done";

let btn=document.createElement("button");

btn.textContent="＋";

btn.onclick=()=>progressTask(i);

let del=document.createElement("button");

del.textContent="削除";
del.className="delete";
del.onclick=()=>deleteTask(i);

row.appendChild(span);
row.appendChild(btn);
row.appendChild(del);

div.appendChild(row);

});

}

function renderChart(){

let data={};

categories.forEach(c=>data[c]={done:0,total:0});

tasks.forEach(t=>{

if(!data[t.category])return;

data[t.category].total++;

if(t.done)data[t.category].done++;

});

let labels=[];
let values=[];
let colors=[];

for(let c in data){

labels.push(c);

let v=0;

if(data[c].total>0){

v=Math.round(data[c].done/data[c].total*100);

}

values.push(v);

colors.push("hsl("+Math.random()*360+",70%,60%)");

}

let ctx=document.getElementById("chart");

new Chart(ctx,{

type:"bar",

data:{

labels:labels,

datasets:[{

label:"達成率%",

data:values,

backgroundColor:colors,

barThickness:20

}]

},

options:{
indexAxis:"y"
}

});

}

function renderHistory(){

let div=document.getElementById("history");
let all=document.getElementById("allHistory");

div.innerHTML="";
all.innerHTML="";

let days={};

tasks.forEach(t=>{

if(!days[t.created])days[t.created]=[];

days[t.created].push(t);

});

let arr=Object.keys(days);

arr.slice(0,5).forEach(d=>{

let el=document.createElement("div");

el.textContent=d;

div.appendChild(el);

});

arr.slice(5).forEach(d=>{

let el=document.createElement("div");

el.textContent=d;

all.appendChild(el);

});

}

function clearHistory(){

if(!confirm("履歴削除してよろしいですか？"))return;

tasks=[];

save();
render();

}

function backup(){

let blob=new Blob([JSON.stringify({categories,tasks},null,2)],{type:"application/json"});

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="learning_backup.json";

a.click();

}

function restore(){

let file=document.getElementById("restoreFile").files[0];

if(!file)return;

let reader=new FileReader();

reader.onload=function(e){

let d=JSON.parse(e.target.result);

categories=d.categories||[];
tasks=d.tasks||[];

save();
render();

};

reader.readAsText(file);

}

function render(){

renderCategories();
renderTasks();
renderChart();
renderHistory();

}

render();

if ("serviceWorker" in navigator) {

navigator.serviceWorker.register("service-worker.js");

}

</script>

</body>
</html>
